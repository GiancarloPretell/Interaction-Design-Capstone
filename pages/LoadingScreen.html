<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading — Yale School of Art</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body {
      background: #808080;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .loading-spinner span {
      display: block;
      position: absolute;
      width: 8px;
      height: 20px;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      animation: spin-fade 1s linear infinite;
    }

    .loading-spinner span:nth-child(1)  { transform: rotate(0deg)   translateX(-50%) translateY(-170%); animation-delay: -0.917s; }
    .loading-spinner span:nth-child(2)  { transform: rotate(30deg)  translateX(-50%) translateY(-170%); animation-delay: -0.833s; }
    .loading-spinner span:nth-child(3)  { transform: rotate(60deg)  translateX(-50%) translateY(-170%); animation-delay: -0.75s; }
    .loading-spinner span:nth-child(4)  { transform: rotate(90deg)  translateX(-50%) translateY(-170%); animation-delay: -0.667s; }
    .loading-spinner span:nth-child(5)  { transform: rotate(120deg) translateX(-50%) translateY(-170%); animation-delay: -0.583s; }
    .loading-spinner span:nth-child(6)  { transform: rotate(150deg) translateX(-50%) translateY(-170%); animation-delay: -0.5s; }
    .loading-spinner span:nth-child(7)  { transform: rotate(180deg) translateX(-50%) translateY(-170%); animation-delay: -0.417s; }
    .loading-spinner span:nth-child(8)  { transform: rotate(210deg) translateX(-50%) translateY(-170%); animation-delay: -0.333s; }
    .loading-spinner span:nth-child(9)  { transform: rotate(240deg) translateX(-50%) translateY(-170%); animation-delay: -0.25s; }
    .loading-spinner span:nth-child(10) { transform: rotate(270deg) translateX(-50%) translateY(-170%); animation-delay: -0.167s; }
    .loading-spinner span:nth-child(11) { transform: rotate(300deg) translateX(-50%) translateY(-170%); animation-delay: -0.083s; }
    .loading-spinner span:nth-child(12) { transform: rotate(330deg) translateX(-50%) translateY(-170%); animation-delay: 0s; background: rgba(40,40,40,0.85); }

    @keyframes spin-fade {
      0%   { opacity: 1; }
      100% { opacity: 0.15; }
    }
  </style>
</head>
<body>
  <div class="loading-spinner">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <script>
    // Auto-redirect to home after 2 seconds
    setTimeout(() => { window.location.href = 'HomeFrame.html'; }, 2000);
  </script>
</body>
</html>
