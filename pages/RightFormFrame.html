<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up (Filled) — Yale School of Art</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/apply.css">
  <link rel="stylesheet" href="../css/form.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="HomeFrame.html" class="nav-logo">
        <span class="logo-y">Y</span>
        <span class="logo-sep">|</span>
        <span class="logo-name">Yale School of Art</span>
      </a>
      <div class="nav-links">
        <a href="ProgramsFrame.html" class="nav-btn">Programs</a>
        <a href="ApplyFrame.html" class="nav-btn">Apply</a>
        <a href="EventsFrame.html" class="nav-btn">Events</a>
        <a href="NewsFrame.html" class="nav-btn">News</a>
        <a href="ContactFrame.html" class="nav-btn">Contact Us</a>
      </div>
      <button class="dark-toggle" id="darkToggle">☾</button>
      <button class="hamburger" id="hamburgerBtn">&#9776;</button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
      <button class="mobile-menu-close" id="mobileMenuClose">&#x2715;</button>
    </div>
    <a href="HomeFrame.html">Home</a>
    <a href="ProgramsFrame.html">Programs</a>
    <a href="ApplyFrame.html">Apply</a>
    <a href="EventsFrame.html">Events</a>
    <a href="NewsFrame.html">News</a>
    <a href="ContactFrame.html">Contact Us</a>
  </div>

  <main class="main-content">
    <div class="form-page-header">
      <h1>Sign up for an event</h1>
      <p class="subtitle">Open House, Portfolio Workshop, or Guest Lectures</p>
    </div>

    <div class="form-card">
      <form data-validate data-redirect="ConfirmationFormFrame.html">
        <div class="form-grid">
          <div class="form-group field-filled">
            <label class="form-label">Event<span class="asterisk-green">*</span></label>
            <select class="form-select">
              <option selected>Spring Open House</option>
            </select>
          </div>

          <div class="form-group field-filled">
            <label class="form-label">Time Slot<span class="asterisk-green">*</span></label>
            <select class="form-select">
              <option selected>Room 206 at 11:10 AM</option>
            </select>
          </div>

          <div class="form-group field-filled">
            <label class="form-label">Full Legal Name<span class="asterisk-green">*</span></label>
            <input type="text" class="form-input" value="John Doe">
          </div>

          <div class="form-group field-filled">
            <label class="form-label">Currently Enrolled<span class="asterisk-green">*</span></label>
            <select class="form-select">
              <option selected>No</option>
            </select>
          </div>

          <div class="form-group field-filled">
            <label class="form-label">Phone Number<span class="asterisk-green">*</span></label>
            <input type="tel" class="form-input" value="+1(860) 123-1234">
          </div>

          <div class="form-group field-filled">
            <label class="form-label">Data Procession Consent<span class="asterisk-green">*</span></label>
            <select class="form-select">
              <option selected>Yes</option>
            </select>
          </div>

          <div class="form-group field-filled">
            <label class="form-label">Email<span class="asterisk-green">*</span></label>
            <input type="email" class="form-input" value="johndoe@email.com">
          </div>

          <div class="form-group" style="display:flex;align-items:flex-end;justify-content:flex-end;">
            <button type="submit" class="btn-primary" style="padding:11px 36px;">Submit</button>
          </div>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">
        <span class="logo-y">Y</span>
        <span style="font-size:0.85rem;margin-left:6px;">Yale School of Art</span>
      </div>
      <div class="footer-contact">
        admissions@yale.edu <span>|</span> 203-432-2606
      </div>
      <div class="footer-links">
        <a href="ContactFrame.html">Campus Visit</a>
        <a href="FAQFrame.html">FAQ</a>
      </div>
    </div>
  </footer>

  <script src="../js/darkmode.js"></script>
  <script src="../js/mobile-menu.js"></script>
  <script src="../js/form-validation.js"></script>
</body>
</html>
